<!DOCTYPE html>
<html>
    <head>
        <title>JH Patel Institude of Management & Technology</title>
        <link rel="icon" href="logo1.webp">

        <style>
            body{
                font-family: Arial, Helvetica, sans-serif;
                margin: 0;
                background: #f8fafc;
                color: #1e293b;
            }
            header{
                height:185px;
                background: linear-gradient(to right,darkblue,rgb(245, 48, 81));
                display:flex;
                align-items:center;
                justify-content:space-between;
                padding:0 60px;
            }
            .logo img{
                width:120px;
                height:120px;
                border-radius:50%;
            }

            .title{
                text-align:center;
                color:white;
            }
            .title h1{
               font-size:35px;
               margin:0;
               text-shadow:3px 3px 5px #000;
            }
            .title h2{
                font-size: 25px;
                margin: 15px 0;
            }
            .title p{
                font-size: 15px;
                color: wheat;
                margin: 0;
            }
            .profile img{
               width:120px;
               height:120px;
               border-radius:50%;
               border:4px solid white;
            } 
            nav{
               background: rgb(78, 78, 79);
               height:35px;
               display:flex;
               justify-content:center;
               align-items:center;
               gap:40px;
               margin-bottom: 20px;
            }
            nav a{
               color:white;
               text-decoration:none;
               font-size:20px;
               
            }
            nav a:hover{
               color: rgb(15, 14, 14);
            }
            .container{
               width:90%;
               margin:auto;
               padding:30px 0;
            }
            .card{
               background: #f2f2f2;
               border-radius:15px;
               overflow:hidden;
               box-shadow:0 5px 15px rgba(0,0,0,0.2);
               transition:0.3s;
            }
            .card:hover{
                transform: scale(1.03);
            }
            .card img{
                width: 100%;
                height: 200px;
                object-fit: cover;
            }
            .card-content{
                padding:10px;
                text-align: center;
            }
            .card-content h2{
                margin-bottom: 5px;
            }
        </style>
    </head>
    <body>
        <header>
            <div class="logo">
               <img src="logo2.webp" alt="logo">
            </div>
            
            <div class="title">
                <h1>JH Patel Institude of Management & Technology</h1>

                <h2>Affiliated to Davanagere University</h2>

                <p>Empowering Minds | Shaping Futures</p>
            </div>
            <div class="profile">
                <img src="jhp.jpg" alt="founder img">
            </div>
        </header>

        <nav>

            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Faculty</a>
            <a href="#">Placement</a>
            <a href="#">Courses</a>
            <a href="#">Events </a>
            <a href="#">Contact</a>

        </nav>
         <center>
        <h1>Welcome to the world of JH Patel<img src=""</h1>
        </center>
        

        <center>
        <table border="5">
            <tr>
                <td>
                    <img src="clgimg.webp" alt="clgimg" width="600">
                </td>
            </tr>
        </table>
        </center>
    </body>
</html>
